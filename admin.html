<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
body { font-family:'Cairo',sans-serif; margin:0; background:#f5f6fa; direction:rtl; padding:20px; }
h2,h3 { text-align:center; }
input,select,textarea,button { width:100%; margin:5px 0; padding:8px; border-radius:5px; border:1px solid #ccc; }
button { background:#ff6b00; color:white; border:none; cursor:pointer; }
button:hover { background:#e55b00; }
.item { display:flex; justify-content:space-between; align-items:center; margin:5px 0; padding:5px; border-bottom:1px solid #ddd; }
.item img { width:50px; height:50px; object-fit:cover; border-radius:5px; margin-left:5px; }
</style>
</head>
<body>

<h2>لوحة الإدارة</h2>

<h3>تعديل اسم المطعم وشعاره</h3>
<input id="restaurantNameInput" placeholder="اسم المطعم">
<input id="logoInput" placeholder="رابط الشعار">
<button onclick="updateRestaurant()">تحديث</button>

<h3>إضافة صنف</h3>
<input id="catName" placeholder="اسم الصنف">
<button onclick="addCategory()">إضافة صنف</button>

<h3>الأصناف الحالية</h3>
<div id="categoryList"></div>

<h3>إضافة منتج</h3>
<input id="name" placeholder="اسم المنتج">
<input id="price" placeholder="السعر">
<textarea id="note" placeholder="ملاحظات"></textarea>
<input id="imageFile" type="file" accept="image/*">
<select id="category"></select>
<button onclick="addProduct()">إضافة منتج</button>

<h3>المنتجات الحالية</h3>
<div id="productList"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// Firebase
const firebaseConfig = {
  apiKey: "AIzaSyAeAAbKRX1mfJQ-aWuM8pXjQX7xhBoQItM",
  authDomain: "menu-abu-flan.firebaseapp.com",
  databaseURL: "https://menu-abu-flan-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "menu-abu-flan",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// البيانات
let categories = [];
let products = [];
let restaurantName = "";
let logoUrl = "";

// تحميل البيانات
function loadData(){
  db.ref("menu").on("value",(snapshot)=>{
    let data = snapshot.val();
    if(data){
      categories = data.categories || [];
      products = data.products || [];
      restaurantName = data.restaurantName || "مطعمك";
      logoUrl = data.logo || "";
      renderCategories();
      renderCategoryList();
      renderProducts();
      document.getElementById('restaurantNameInput').value = restaurantName;
      document.getElementById('logoInput').value = logoUrl;
    }
  });
}

// حفظ البيانات
function saveData(){
  db.ref("menu").set({
    categories: categories,
    products: products,
    restaurantName: restaurantName,
    logo: logoUrl
  });
}

// تحديث اسم المطعم والشعار
function updateRestaurant(){
  let name = document.getElementById('restaurantNameInput').value.trim();
  let logo = document.getElementById('logoInput').value.trim();
  if(name) restaurantName = name;
  if(logo) logoUrl = logo;
  saveData();
  alert("تم التحديث ✅");
}

// الأصناف
function renderCategories(){
  let select=document.getElementById('category'); 
  select.innerHTML="";
  categories.forEach(c => select.innerHTML += `<option>${c}</option>`);
}
function renderCategoryList(){
  let html="";
  categories.forEach((c,i)=>{
    html+=`<div class="item">
      <span>${c}</span>
      <div>
        <button onclick="editCategory(${i})">✏️</button>
        <button onclick="deleteCategory(${i})">❌</button>
      </div>
    </div>`;
  });
  document.getElementById('categoryList').innerHTML=html;
}
function addCategory(){
  let name=document.getElementById('catName').value.trim();
  if(!name){ alert("اكتب اسم الصنف"); return; }
  categories.push(name); saveData();
  document.getElementById('catName').value="";
}
function editCategory(i){
  let newName=prompt("اسم جديد",categories[i]);
  if(newName){ categories[i]=newName; saveData(); }
}
function deleteCategory(i){
  if(confirm("حذف الصنف؟")){ categories.splice(i,1); saveData(); }
}

// المنتجات
function renderProducts(){
  let html="";
  products.forEach((p,i)=>{
    html+=`<div class="item">
      <span>${p.name} - ${p.price.toLocaleString()}</span>
      <img src="${p.image}">
      <div>
        <button onclick="editProduct(${i})">✏️</button>
        <button onclick="deleteProduct(${i})">❌</button>
      </div>
    </div>`;
  });
  document.getElementById('productList').innerHTML=html;
}

function addProduct(){
  let name=document.getElementById('name').value.trim();
  let price=document.getElementById('price').value;
  let category=document.getElementById('category').value;
  let note=document.getElementById('note').value.trim();
  let file=document.getElementById('imageFile').files[0];
  if(!name || price==="" || isNaN(price) || !file){ alert("تحقق من البيانات"); return; }

  let reader=new FileReader();
  reader.onload=function(e){
    products.push({name:name, price:parseInt(price), category:category, note:note, image:e.target.result});
    saveData();
    document.getElementById('name').value="";
    document.getElementById('price').value="";
    document.getElementById('note').value="";
    document.getElementById('imageFile').value="";
  };
  reader.readAsDataURL(file);
}

function editProduct(i){
  let newName=prompt("اسم",products[i].name);
  let newPrice=prompt("سعر",products[i].price);
  if(newName && newPrice){ products[i].name=newName; products[i].price=parseInt(newPrice); saveData(); }
}
function deleteProduct(i){
  if(confirm("حذف؟")){ products.splice(i,1); saveData(); }
}

// تشغيل
loadData();
</script>
</body>
</html>
