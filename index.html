<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu - مطعمك</title>

<!-- رابط خط Cairo من Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">

<style>
/* ==== ستايل عام ==== */
body, input, select, textarea, button {
  font-family: 'Cairo', sans-serif !important;
}

body { margin:0; background:#f5f6fa; direction:rtl; }
header { background:#111; color:white; display:flex; justify-content:space-between; align-items:center; padding:10px; }
header img { width:50px; border-radius:5px; }
h2, h3, h4, p { margin:0; }
nav { background:#ff6b00; text-align:center; padding:10px; }
nav button { background:none; border:none; color:white; margin:5px; font-weight:bold; cursor:pointer; font-size:16px; }

#menu { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:15px; padding:10px; margin-top:10px; }

.item { background:white; padding:10px; border-radius:12px; text-align:center; box-shadow:0 2px 5px rgba(0,0,0,0.1); transition:0.3s; }
.item:hover { transform:translateY(-3px); box-shadow:0 5px 10px rgba(0,0,0,0.15); }
.item img { width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:10px; }

.note { font-size:12px; color:#555; margin-top:3px; } /* ملاحظات المنتج */
</style>
</head>

<body>

<header>
  <img id="logo" src="https://cdn-icons-png.flaticon.com/512/3075/3075977.png" alt="Logo">
  <h2 id="restaurantName">مطعمك</h2>
  <button onclick="adminLogin()">🔒</button> <!-- زر الدخول للادمن -->
</header>

<nav id="nav"></nav>
<div id="menu"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ================= إعداد Firebase =================
const firebaseConfig = {
  apiKey: "AIzaSyAeAAbKRX1mfJQ-aWuM8pXjQX7xhBoQItM",
  authDomain: "menu-abu-flan.firebaseapp.com",
  databaseURL: "https://menu-abu-flan-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "menu-abu-flan",
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= المتغيرات =================
let categories = []; // قائمة الأصناف
let products = [];   // المنتجات
let restaurantName = ""; // اسم المطعم
let logoUrl = "";        // رابط الشعار

// ================= تحميل البيانات =================
function loadData(){
  db.ref("menu").on("value", (snapshot)=>{
    let data = snapshot.val();
    if(data){
      categories = data.categories || [];
      products = data.products || [];
      restaurantName = data.restaurantName || "مطعمك";
      logoUrl = data.logo || "https://cdn-icons-png.flaticon.com/512/3075/3075977.png";

      renderNav(); // عرض قوائم الأصناف
      showCategory(categories[0]); // عرض أول صنف
      document.getElementById('restaurantName').innerText = restaurantName;
      document.getElementById('logo').src = logoUrl;
    }
  });
}

// ================= عرض الأصناف =================
function renderNav(){
  let navHtml = "";
  categories.forEach(c => {
    navHtml += `<button onclick="showCategory('${c}')">${c}</button>`;
  });
  document.getElementById('nav').innerHTML = navHtml;
}

// ================= عرض المنتجات حسب الصنف =================
function showCategory(cat){
  let html = "";
  products.filter(p => p.category===cat).forEach(p => {
    html += `<div class="item">
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <p>${p.price.toLocaleString()} د.ع</p>
      ${p.note?`<div class="note">${p.note}</div>`:""} <!-- ملاحظة المنتج -->
    </div>`;
  });
  document.getElementById('menu').innerHTML = html;
}

// ================= دخول الأدمن =================
function adminLogin(){
  let pass = prompt("ادخل كلمة سر الأدمن");
  if(pass==="1973"){
    window.location.href="admin.html";
  } else {
    alert("كلمة سر خاطئة ❌");
  }
}

// ================= تشغيل =================
loadData();
</script>

<footer style="background:#111;color:#ff6b00;text-align:center;padding:10px;font-size:10px;font-weight:bold;width:100%;">
تم برمجة هذا الموقع بواسطة فريق STS العراقي
</footer>

</body>
</html>
